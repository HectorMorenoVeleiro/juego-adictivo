<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Minero Extremo: Día y Noche</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="interfaz">
      <div id="Estado">
        Fase: <span id="fase-actual">DÍA</span> | Oro: <span id="oro">0</span>
      </div>
      <div id="corazones"></div>
      <div id="tienda">
        <div id="btn-dormir" class="btn-dormir" title="Dormir (Iniciar Noche)"></div>
      </div>
    </div>

    <div id="menu-inicio" class="pantalla-muerte" style="display: flex">
      <div class="menu-contenido">
        <h1 class="menu-titulo">MINERO EXTREMO</h1>
        <p class="menu-mejor">Mejor noche: <span id="mejor-noche">—</span></p>
        <button id="btn-jugar" class="menu-btn">JUGAR</button>
        <div class="menu-controles">
          <span>WASD — Moverse</span>
          <span>ESPACIO — Interactuar</span>
        </div>
      </div>
    </div>
    <div id="pantalla-juego" style="display: none">
      <div id="mundo">
        <div id="mercado" class="sprite mercado-sprite" title="Mercado"></div>
        <div id="menu-mercado" class="menu-mercado" style="display: none">
          <div class="menu-titulo">MERCADO</div>
          <button class="menu-btn" data-action="corazon">
            <span class="menu-btn-label">Corazón +1</span>
            <span class="menu-btn-precio">5 oro</span>
          </button>
          <button class="menu-btn" data-action="pico">
            <span class="menu-btn-label">Mejorar Pico</span>
            <span class="menu-btn-precio" id="precio-pico">-</span>
          </button>
          <button class="menu-btn" data-action="espada">
            <span class="menu-btn-label">Mejorar Espada</span>
            <span class="menu-btn-precio" id="precio-espada">-</span>
          </button>
          <button class="menu-btn menu-btn-cerrar" data-action="cerrar">Cerrar</button>
        </div>
        <div id="jugador" class="sprite"></div>
        <!-- Los bloques y enemigos se generan con JS -->
      </div>
      <div id="mensaje" class="mensaje" style="display: none">
        <span id="mensaje-texto"></span>
        <span class="mensaje-enter">[ESPACIO]</span>
      </div>
      <div id="interact-msg" class="interact-msg" style="display: none">[ESPACIO]</div>
      <div id="indicador-mercado" class="indicador-mercado" style="display: none"></div>
      <div id="pantalla-muerte" class="pantalla-muerte" style="display: none">
        <div class="muerte-contenido">
          <h1>HAS MUERTO</h1>
          <p class="muerte-noche">Noche <span id="muerte-noche">1</span></p>
          <p class="muerte-reiniciar">Pulsa ENTER para reiniciar</p>
        </div>
      </div>
      <div id="pantalla-pausa" class="pantalla-muerte" style="display: none">
        <div class="menu-contenido pausa-contenido">
          <h1 class="pausa-titulo">PAUSA</h1>
          <button class="menu-btn pausa-btn" id="btn-reanudar">REANUDAR</button>
          <button class="menu-btn pausa-btn" id="btn-reiniciar">REINICIAR</button>
        </div>
      </div>
      <div id="herramientas">
        <div id="slot-pico" class="slot-herramienta slot-activo">
          <span class="slot-tecla">1</span>
        </div>
        <div id="slot-espada" class="slot-herramienta">
          <span class="slot-tecla">2</span>
        </div>
      </div>
      <div id="minimapa">
        <canvas id="minimapa-canvas" width="100" height="75"></canvas>
      </div>
      <div id="quest-bar"><span id="quest-text"></span></div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
