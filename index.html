<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Minero Extremo: Día y Noche</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="interfaz">
      <div id="Estado">
        Fase: <span id="fase-actual">DÍA</span> | Oro: <span id="oro">0</span>
      </div>
      <div id="corazones"></div>
      <div id="tienda">
        <button
          id="btn-dormir"
          onclick="if (fase === 'DIA') cambiarFase('NOCHE');"
        >
          DORMIR (Iniciar Noche)
        </button>
      </div>
    </div>

    <!-- La sala de la mina -->
    <div id="pantalla-juego">
      <div id="mundo">
        <div
          class="sombra"
          style="
            width: 1000px;
            height: 200px;
            left: -25px;
            top: -70px;
            opacity: 0.7;
          "
        ></div>
        <div id="mercado" class="sprite mercado-sprite" title="Mercado"></div>
        <div
          id="menu-sprite"
          class="sprite menu-sprite"
          style="display: none"
        ></div>
        <div id="jugador" class="sprite"></div>
        <!-- Los bloques y enemigos se generan con JS -->
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
