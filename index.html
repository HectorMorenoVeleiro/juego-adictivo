<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Minero Extremo: Día y Noche</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="interfaz">
      <div id="Estado">
        Fase: <span id="fase-actual">DÍA</span> | Oro: <span id="oro">0</span>
      </div>
      <div id="corazones"></div>
      <div id="tienda">
        <button
          id="btn-dormir"
          onclick="if (fase === 'DIA') cambiarFase('NOCHE');"
        >
          DORMIR (Iniciar Noche)
        </button>
      </div>
    </div>

    <!-- La sala de la mina -->
    <div id="pantalla-juego">
      <div id="mundo">
        <div
          class="sombra"
          style="width: 200px; height: 32px; left: 26px; top: 105px"
        ></div>
        <div id="mercado" class="sprite mercado-sprite" title="Mercado"></div>
        <!-- Menú del mercado (fuera de pantalla-juego) -->
        <div id="menu-mercado" style="display: none">
          <div id="menu-mercado-contenido">
            <h2>🏪 Mercado</h2>
            <button onclick="comprarEspada()">⚔️ Espada — 10 oro</button>
            <button onclick="comprarCorazon()">❤️ Vida extra — 5 oro</button>
            <button onclick="comprarPico()">⛏️ Pico fuerte — 8 oro</button>
            <button onclick="cerrarMercado()">✖ Cerrar</button>
          </div>
        </div>
        <div id="jugador" class="sprite"></div>
        <!-- Los bloques y enemigos se generan con JS -->
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
